[build-system]
requires = ["hatchling>=1.25.0"]
build-backend = "hatchling.build"

[project]
name = "maivn-shared"
version = "0.1.0"
description = "Shared utilities and core components for Maivn"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Chad Heathcote" }]
keywords = ["maivn", "shared", "utilities"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: Apache Software License",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.28.1",
    "langchain-core>=1.2.7",
    "orjson>=3.11.4",
    "pydantic>=2.12.0",
]

[dependency-groups]
dev = ["ruff>=0.14.14,<1", "pytest>=9.0.2", "pyright>=1.1.408"]

[tool.hatch.build.targets.wheel]
packages = ["src/maivn_shared"]
include = ["src/maivn_shared/py.typed"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = []

[tool.ruff.lint.isort]
required-imports = ["from __future__ import annotations"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
