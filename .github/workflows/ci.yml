name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: maivn-shared-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --frozen

      - name: Validate OSS license report
        run: uv run --no-sync python scripts/oss_license_audit.py

      - name: Ruff
        run: uv run --no-sync ruff check .

      # NOTE: strict type checking is a MONOREPO gate, not a standalone step.
      # Run it from the maivn-apps superproject: `uv run python scripts/typecheck.py`
      # (also enforced by scripts/verify.ps1 and `verify.ps1 full-ci`). A standalone
      # `basedpyright -p .` cannot resolve workspace siblings from source, and the
      # monorepo-relative venvPath ('../..') overshoots the repo root -> exit 3.
      # Do NOT re-add a standalone basedpyright step here.

      - name: Pytest
        run: uv run --no-sync pytest
